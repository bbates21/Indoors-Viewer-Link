<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening BYU-I Campus Map...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f7fa;
            color: #333;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #0076c6;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="spinner"></div>
    <h2>Opening ArcGIS Indoors...</h2>
    <p>If you don't have the app, you will be redirected to download it shortly.</p>
</div>

<script>
    (function() {
        // 1. Define your Map Package ID and Store Links
        const itemId = "065c232da8c044e4af1ad0e5d6736787";
        const appLink = `arcgis-indoors://?id=${itemId}`;
        
        const appStoreUrl = "https://apps.apple.com/us/app/arcgis-indoors/id1439243415";
        const playStoreUrl = "https://play.google.com/store/apps/details?id=com.esri.indoors";
        const fallbackUrl = "https://maps.byui.edu/portal/"; // For desktop users

        // 2. Detect the User's Operating System
        const userAgent = navigator.userAgent || navigator.vendor || window.opera;
        let destinationStore = fallbackUrl;

        if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
            destinationStore = appStoreUrl;
        } else if (/android/i].test(userAgent)) {
            destinationStore = playStoreUrl;
        }

        // 3. The Magic: Attempt to trigger the app open
        window.location.href = appLink;

        // 4. Fallback Timeout
        // If the app is installed, the browser leaves this page and the timer pauses.
        // If the app isn't installed, the timer finishes and redirects to the App Store.
        setTimeout(function() {
            window.location.href = destinationStore;
        }, 2500); // 2.5 second delay gives the device enough time to prompt the user
    })();
</script>

</body>
</html>
